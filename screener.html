<!DOCTYPE html>

    <title>策略選股清單 - 抄底資金流 (Bottom-Fishing Screener)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎣</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .stock-checkbox {
            appearance: none; background-color: #1f2937; margin: 0; font: inherit; color: currentColor;
            width: 1.15em; height: 1.15em; border: 1px solid #4b5563; border-radius: 0.25em; display: grid; place-content: center; cursor: pointer; transition: all 0.2s;
        }
        .stock-checkbox::before {
            content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #34d399; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .stock-checkbox:checked { border-color: #34d399; }
        .stock-checkbox:checked::before { transform: scale(1); }
    </style>
</head>

                    <li><strong class="text-gray-200">股價未過熱條件：</strong>資金流量指標 (MFI) 必須小於 45。</li>

                </ul>
