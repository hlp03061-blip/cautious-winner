<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略選股清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-gray-700 pb-4 gap-4">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <a href="index.html" class="text-gray-400 hover:text-white transition-colors">◀ 返回首頁</a>
                </div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">🎯 波段策略選股清單</h1>
                <p class="text-xs text-gray-400 mt-1">基於資金流向與技術指標的自動化篩選 (支援自選觀察名單)</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                <div id="market-selector" class="bg-gray-800 p-1.5 rounded-xl border border-gray-700 flex gap-1">
                    <button id="market-hk" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-indigo-600 text-white transition-all" onclick="switchMarket('HK')">
                        🇭🇰 港股市場
                    </button>
                    <button id="market-sp500" class="px-3 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:text-white transition-all" onclick="switchMarket('SP500')">
                        🇺🇸 S&P 500
                    </button>
                </div>

                <div id="date-panel" class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <span class="text-gray-400 font-bold text-sm">📅 數據日期：</span>
                    <span id="latest-date" class="text-white font-mono font-bold">載入中...</span>
                </div>
            </div>
        </header>

        <div class="flex flex-wrap gap-2 mb-6">
            <button id="tab-1" class="strategy-tab active bg-indigo-600 border-indigo-400 text-white border-2 px-4 py-2 rounded-lg font-bold shadow-lg transition-all" onclick="switchTab(1)">
                🕵️‍♂️ 密密吸納 (底背離波段)
            </button>
            <button id="tab-2" class="strategy-tab bg-gray-800 border-gray-700 text-gray-400 border px-4 py-2 rounded-lg font-bold hover:bg-gray-700 transition-all" onclick="switchTab(2)">
                🚀 動能確認 (雙重資金流入)
            </button>
            <button id="tab-3" class="strategy-tab bg-gray-800 border-gray-700 text-gray-400 border px-4 py-2 rounded-lg font-bold hover:bg-gray-700 transition-all" onclick="switchTab(3)">
                🔥 熱錢狙擊 (高資金影響力)
            </button>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-xl border border-gray-700 overflow-hidden RichmondFlex flex flex-col">
            <div class="p-4 border-b border-gray-700 bg-gray-800/50 flex justify-between items-center">
                <h2 id="strategy-title" class="text-lg font-bold text-indigo-400">🕵️‍♂️ 策略載入中...</h2>
                <span id="strategy-count" class="bg-gray-700 text-gray-300 text-xs font-semibold px-2.5 py-0.5 rounded">0 隻符合</span>
            </div>
            
            <div class="overflow-x-auto flex-grow">
                <table class="min-w-full text-left text-sm text-gray-300">
                    <thead id="table-head">
                    </thead>
                    <tbody id="strategy-body">
                        <tr><td colspan="8" class="p-8 text-center text-gray-500">正在分析資金流向，請稍候...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="p-4 border-t border-gray-700 bg-gray-900/50 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <button id="copy-btn" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 text-white px-4 py-2 rounded-lg shadow transition-colors text-sm font-bold flex items-center gap-2">
                        📋 複製此頁所有代號 (用 ; 分隔)
                    </button>
                    <span id="copy-feedback" class="text-emerald-400 text-sm font-bold opacity-0 transition-opacity duration-300">✅ 複製成功！</span>
                </div>
                <div id="watchlist-note" class="text-xs text-gray-400">
                    勾選 🌟 可加入港股觀察名單 (將儲存於瀏覽器中)
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="strategy.js"></script>
</body>
</html>
