<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精選港股 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">📊 港股精選數據市埸雷達</h1>
            <div id="latest-date" class="text-sm text-gray-400 bg-gray-800 px-3 py-1 rounded border border-gray-700">更新日期：載入中...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 border-t-4 border-t-green-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-green-400 flex items-center gap-2">📉 唯讀防護：回調買入 (Buy Dip)</h2>
                    <span id="buy-dip-count" class="bg-green-900 text-green-300 text-xs font-semibold px-2.5 py-0.5 rounded">0 隻觸發</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm text-gray-300">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 font-medium">
                                <th class="p-3">代號</th>
                                <th class="p-3">名稱</th>
                                <th class="p-3 text-right">現價</th>
                                <th class="p-3 text-center">綜合評級</th>
                            </tr>
                        </thead>
                        <tbody id="buy-dip-body">
                            <tr><td colspan="4" class="p-4 text-center text-gray-500">正在安全連線至 Supabase 讀取最新數據...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 border-t-4 border-t-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-blue-400 flex items-center gap-2">🚀 動能變盤：成交量擠壓 (Vol Squeeze)</h2>
                    <span id="squeeze-count" class="bg-blue-900 text-blue-300 text-xs font-semibold px-2.5 py-0.5 rounded">0 隻觸發</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm text-gray-300">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 font-medium">
                                <th class="p-3">代號</th>
                                <th class="p-3">名稱</th>
                                <th class="p-3 text-right">現價</th>
                                <th class="p-3 text-center">MACD動能</th>
                            </tr>
                        </thead>
                        <tbody id="squeeze-body">
                            <tr><td colspan="4" class="p-4 text-center text-gray-500">正在安全連線至 Supabase 讀取最新數據...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
